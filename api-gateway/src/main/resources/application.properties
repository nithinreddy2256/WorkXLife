server.port=8080
spring.application.name=api-gateway

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# API Gateway Routes
spring.cloud.gateway.routes[0].id=authentication-service
spring.cloud.gateway.routes[0].uri=lb://authentication-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=job-service
spring.cloud.gateway.routes[1].uri=lb://job-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/jobs/**

spring.cloud.gateway.routes[2].id=user-profile-service
spring.cloud.gateway.routes[2].uri=lb://user-profile-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[3].id=application-service
spring.cloud.gateway.routes[3].uri=lb://application-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/applications/**

spring.cloud.gateway.routes[4].id=recommendation-service
spring.cloud.gateway.routes[4].uri=lb://recommendation-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/recommendations/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/notifications/**

